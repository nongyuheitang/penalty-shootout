<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界杯点球大战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Arial', sans-serif;
    }
    #app {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    canvas {
      display: block;
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(255, 180, 0, 0.3);
      max-width: 100vw;
      max-height: 100vh;
    }
    #ui-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    #joycon-btn {
      padding: 10px 22px;
      font-size: 14px;
      font-weight: bold;
      border: 2px solid #ffcc00;
      background: rgba(255, 204, 0, 0.12);
      color: #ffcc00;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #joycon-btn:hover { background: rgba(255, 204, 0, 0.25); }
    #joycon-btn.connected {
      border-color: #00ff88;
      color: #00ff88;
      background: rgba(0, 255, 136, 0.12);
    }
    #joycon-btn:disabled { opacity: 0.6; cursor: default; }
    #joycon-status {
      color: #aaa;
      font-size: 13px;
    }
    #webhid-warning {
      color: #ff6b6b;
      font-size: 11px;
      text-align: center;
      display: none;
      margin-bottom: 6px;
    }
    #restart-btn {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui-bar">
      <button id="joycon-btn">🎮 连接 Joy-Con</button>
      <span id="joycon-status"></span>
      <button id="restart-btn">🔄 重新开始 (R)</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="webhid-warning">
      ⚠️ 当前浏览器不支持 WebHID。请使用 Chromium 内核浏览器（Chrome / Edge）打开，Joy-Con 功能将不可用。<br/>
      鼠标和键盘仍可正常游戏。
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
